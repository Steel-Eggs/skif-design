<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Услуги — СКИФ</title>
  <link rel="stylesheet" href="/bitrix/css/base.css">
  <link rel="stylesheet" href="/bitrix/css/header.css">
  <link rel="stylesheet" href="/bitrix/css/services.css">
  <link rel="stylesheet" href="/bitrix/css/footer.css">
</head>
<body>

<!-- HEADER: см. index.html -->

<main class="flex-1">
  <!-- Hero -->
  <section class="relative py-16 md:py-24 gradient-primary overflow-hidden">
    <div class="container relative z-10">
      <nav class="flex items-center gap-2 text-primary-foreground/70 text-sm mb-8">
        <a href="/" class="hover:text-primary-foreground">Главная</a>
        <span>/</span>
        <span class="text-primary-foreground">Услуги</span>
      </nav>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-heading font-black text-primary-foreground mb-6">Наши услуги</h1>
      <p class="text-xl text-primary-foreground/80 max-w-2xl">Полный спектр услуг по обслуживанию прицепов</p>
    </div>
  </section>

  <!-- Services grid -->
  <section class="py-16 md:py-24">
    <div class="container">
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- SERVICE CARD -->
        <a href="/services/tradein/" class="group block">
          <div class="h-full overflow-hidden rounded-2xl bg-card border-2 hover:border-primary/30 transition-all hover:shadow-xl">
            <div class="aspect-video overflow-hidden">
              <img src="/assets/services/tradein.jpg" alt="Trade-In" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            </div>
            <div class="p-6">
              <h3 class="text-xl font-heading font-bold text-foreground mb-3 group-hover:text-primary">Выкуп/Trade-In легковых прицепов</h3>
              <p class="text-muted-foreground mb-4 line-clamp-2">Обменяйте свой старый прицеп на новый легко и выгодно!</p>
              <div class="flex flex-wrap gap-2 mb-4">
                <span class="text-xs px-3 py-1 rounded-full bg-primary/10 text-primary font-medium">Выкуп за 40%</span>
                <span class="text-xs px-3 py-1 rounded-full bg-primary/10 text-primary font-medium">Комиссия 20 000 ₽</span>
              </div>
              <span class="text-primary font-semibold inline-flex items-center gap-1">Подробнее →</span>
            </div>
          </div>
        </a>
        <!-- /SERVICE CARD -->
        <!-- Повторить для каждой услуги: credit, service, delivery, registration, towbar, rental, tuning -->
      </div>
    </div>
  </section>
</main>

<!-- FOOTER: см. index.html -->

</body>
</html>
