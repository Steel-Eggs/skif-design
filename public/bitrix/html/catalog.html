<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог продукции — СКИФ</title>
  <meta name="description" content="Более 1500 моделей прицепов, запчастей и аксессуаров от ведущих производителей России">
  <link rel="stylesheet" href="/bitrix/css/base.css">
  <link rel="stylesheet" href="/bitrix/css/header.css">
  <link rel="stylesheet" href="/bitrix/css/catalog.css">
  <link rel="stylesheet" href="/bitrix/css/footer.css">
</head>
<body>

<!-- HEADER: см. index.html -->

<main class="flex-1">
  <!-- Hero -->
  <section class="py-12 md:py-20 bg-gradient-to-br from-primary/5 via-background to-accent/5">
    <div class="container">
      <div class="text-center max-w-3xl mx-auto">
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-heading font-bold text-foreground mb-6">Каталог продукции</h1>
        <p class="text-lg md:text-xl text-muted-foreground">Более 1500 моделей прицепов, запчастей и аксессуаров от ведущих производителей России</p>
      </div>
    </div>
  </section>

  <!-- Распродажа (featured) -->
  <!-- Bitrix: catalog.section.list с фильтром featured -->
  <section class="py-8 bg-background overflow-hidden">
    <div class="container px-4">
      <a href="/catalog/sale/" class="group block">
        <div class="relative overflow-hidden rounded-2xl md:rounded-3xl bg-gradient-to-r from-red-500 to-orange-500 p-6 md:p-12 shadow-2xl transition-all hover:scale-[1.02]">
          <div class="absolute inset-0 opacity-20">
            <div class="absolute top-0 left-0 w-48 md:w-96 h-48 md:h-96 bg-white rounded-full blur-3xl"></div>
          </div>
          <div class="relative flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-8">
            <div class="w-16 h-16 md:w-32 md:h-32 rounded-2xl md:rounded-3xl bg-white/20 backdrop-blur-sm flex items-center justify-center">
              <!-- Tag icon -->
              <svg class="w-8 h-8 md:w-16 md:h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <h2 class="text-xl md:text-4xl font-heading font-bold text-white mb-2">Распродажа</h2>
              <p class="text-white/80 text-sm md:text-lg mb-2 md:mb-4">Лучшие цены на популярные модели</p>
              <span class="inline-flex items-center gap-2 text-white font-semibold text-sm md:text-base">23 товаров</span>
            </div>
          </div>
        </div>
      </a>
    </div>
  </section>

  <!-- Все категории -->
  <!-- Bitrix: catalog.section.list -->
  <section class="py-12 md:py-20">
    <div class="container">
      <h2 class="text-2xl md:text-3xl font-heading font-bold text-foreground mb-8">Все категории</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- CATEGORY CARD (повторяется) -->
        <a href="/catalog/odnoosnye/" class="group block">
          <div class="relative h-full bg-card border-2 border-border rounded-2xl p-6 transition-all hover:border-primary/30 hover:shadow-xl hover:-translate-y-2 overflow-hidden">
            <div class="relative mb-5">
              <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-primary to-primary/80 flex items-center justify-center group-hover:scale-110 group-hover:rotate-6 transition-all">
                <!-- Icon -->
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              </div>
            </div>
            <div class="relative">
              <h3 class="text-lg font-heading font-bold text-foreground mb-2 group-hover:text-primary">Одноосные прицепы</h3>
              <p class="text-sm text-muted-foreground mb-4 line-clamp-2">Компактные решения для перевозки грузов</p>
              <div class="flex items-center justify-between">
                <span class="text-xs font-medium text-muted-foreground bg-muted px-3 py-1.5 rounded-full">156 товаров</span>
                <div class="w-8 h-8 rounded-full bg-muted flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-all">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
              </div>
            </div>
          </div>
        </a>
        <!-- /CATEGORY CARD -->
        <!-- Повторить для всех категорий -->
      </div>
    </div>
  </section>
</main>

<!-- FOOTER: см. index.html -->

</body>
</html>
