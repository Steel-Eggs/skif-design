<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — СКИФ</title>
  <link rel="stylesheet" href="/bitrix/css/base.css">
  <link rel="stylesheet" href="/bitrix/css/header.css">
  <link rel="stylesheet" href="/bitrix/css/footer.css">
</head>
<body>

<!-- HEADER: см. index.html -->

<main class="flex-1">
  <div class="container mx-auto px-4 py-6">
    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-muted-foreground mb-6">
      <a href="/" class="hover:text-primary">Главная</a>
      <span>/</span>
      <span class="text-foreground">Корзина</span>
    </nav>

    <h1 class="text-2xl md:text-3xl font-bold mb-6">Корзина</h1>

    <!-- Bitrix: sale.basket.basket -->
    <div class="grid lg:grid-cols-3 gap-6">
      <!-- Main cart content -->
      <div class="lg:col-span-2 space-y-4">
        <!-- Delivery option -->
        <div class="bg-gradient-to-r from-secondary/10 to-secondary/5 rounded-lg border border-secondary/30 p-4">
          <div class="flex items-center gap-3">
            <input type="checkbox" id="needs-delivery">
            <label for="needs-delivery" class="flex items-center gap-2 cursor-pointer select-none">
              <svg class="w-5 h-5 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              <span class="text-sm font-medium">Нужна доставка</span>
            </label>
          </div>
        </div>

        <!-- Cart items -->
        <div class="bg-white rounded-lg border divide-y">
          <!-- CART ITEM -->
          <div class="p-3 md:p-4">
            <div class="flex items-center gap-4">
              <a href="/product/1/" class="shrink-0">
                <img src="/assets/products/trailer-1.jpg" alt="Прицеп" class="w-28 h-20 object-cover rounded">
              </a>
              <div class="flex-1 min-w-0">
                <a href="/product/1/" class="font-medium hover:text-primary line-clamp-2">Прицеп для квадроцикла ССТ-7132-мини</a>
              </div>
              <div class="text-right shrink-0">
                <div class="font-semibold text-primary whitespace-nowrap">57 500 руб.</div>
                <div class="text-xs text-muted-foreground">цена за 1 шт</div>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <button class="w-8 h-8 flex items-center justify-center border rounded">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <input type="number" value="1" min="1" class="w-14 text-center border rounded py-1">
                <button class="w-8 h-8 flex items-center justify-center border rounded">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
              </div>
              <span class="text-sm text-muted-foreground shrink-0">шт</span>
              <button class="text-muted-foreground hover:text-destructive shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
          <!-- /CART ITEM -->
        </div>

        <!-- Compatible parts -->
        <div class="bg-white rounded-lg border p-4 mt-6">
          <div class="flex items-center gap-2 mb-4">
            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
            <h3 class="font-bold text-lg">Подойдёт к этому прицепу</h3>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <!-- COMPATIBLE PART CARD -->
            <div class="overflow-hidden rounded-lg border bg-card hover:shadow-md p-3">
              <a href="/product/201/">
                <img src="/assets/parts/amortizator.jpg" alt="Амортизатор" class="w-full aspect-square object-cover rounded mb-2">
              </a>
              <a href="/product/201/" class="text-sm font-medium line-clamp-2 hover:text-primary mb-2 block h-10">Амортизатор AL-KO Octagon</a>
              <div class="flex items-baseline gap-1 mb-2">
                <span class="font-bold text-sm">2 450 руб.</span>
                <span class="text-xs text-muted-foreground line-through">2 900 руб.</span>
              </div>
              <button class="w-full gradient-primary text-white text-xs py-2 rounded-lg inline-flex items-center justify-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Добавить
              </button>
            </div>
            <!-- /COMPATIBLE PART CARD -->
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-4">
        <!-- Order summary -->
        <div class="bg-white rounded-lg border p-6 sticky top-24">
          <h2 class="font-bold text-lg mb-4">Итого</h2>
          <div class="space-y-3 mb-6">
            <div class="flex justify-between"><span class="text-muted-foreground">Товары (1)</span><span class="font-semibold">57 500 руб.</span></div>
            <div class="flex justify-between"><span class="text-muted-foreground">Доставка</span><span class="text-sm text-muted-foreground">По согласованию</span></div>
          </div>
          <div class="flex justify-between items-center py-4 border-t border-border">
            <span class="font-bold text-lg">Итого:</span>
            <span class="text-2xl font-bold text-primary">57 500 руб.</span>
          </div>
          <a href="/checkout/">
            <button class="w-full gradient-accent font-bold py-3 rounded-lg text-accent-foreground mt-4">Оформить заказ</button>
          </a>
          <a href="tel:+78002001636" class="block mt-3">
            <button class="w-full border border-border font-bold py-3 rounded-lg">Быстрый заказ по телефону</button>
          </a>
        </div>

        <!-- Trust badges -->
        <div class="grid grid-cols-2 gap-3">
          <div class="flex items-center gap-3 bg-card rounded-lg border p-3">
            <svg class="w-5 h-5 text-primary shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="text-xs font-medium">Гарантия качества</span>
          </div>
          <div class="flex items-center gap-3 bg-card rounded-lg border p-3">
            <svg class="w-5 h-5 text-primary shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            <span class="text-xs font-medium">Поддержка 24/7</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- FOOTER: см. index.html -->

</body>
</html>
