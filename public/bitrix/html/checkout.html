<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — СКИФ</title>
  <link rel="stylesheet" href="css/skif.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        container: { center: true, padding: '1rem', screens: { '2xl':'1400px' } },
        extend: {
          fontFamily: { sans:['Open Sans','system-ui','sans-serif'], heading:['Montserrat','system-ui','sans-serif'] },
          colors: {
            border:'hsl(210 15% 90%)', background:'hsl(210 15% 97%)', foreground:'hsl(200 50% 10%)',
            primary:{ DEFAULT:'hsl(202 83% 26%)', foreground:'hsl(0 0% 100%)' },
            secondary:{ DEFAULT:'hsl(152 68% 42%)', foreground:'hsl(0 0% 100%)' },
            muted:{ DEFAULT:'hsl(210 15% 94%)', foreground:'hsl(200 20% 40%)' },
            accent:{ DEFAULT:'hsl(152 68% 34%)', foreground:'hsl(0 0% 100%)' },
            destructive:{ DEFAULT:'hsl(0 84% 60%)', foreground:'hsl(0 0% 100%)' },
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col bg-background font-sans">

<!-- HEADER: см. index.html -->

<main class="flex-1">
  <div class="container mx-auto px-4 py-6">
    <!-- Breadcrumb -->
    <!-- Bitrix: sale.order.ajax -->
    <nav class="flex items-center gap-2 text-sm text-muted-foreground mb-6">
      <a href="/" class="hover:text-primary">Главная</a>
      <span>/</span>
      <a href="cart.html" class="hover:text-primary">Корзина</a>
      <span>/</span>
      <span class="text-foreground">Оформление заказа</span>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6">
      <!-- Main content -->
      <div class="flex-1">
        <form action="" method="post">
          <!-- Section 1: Payment -->
          <div class="bg-white rounded-lg border mb-4 overflow-hidden">
            <div class="bg-muted/50 px-4 py-3 border-b cursor-pointer">
              <h2 class="font-semibold flex items-center gap-2">
                <span class="w-6 h-6 bg-primary text-white rounded-full flex items-center justify-center text-sm">1</span>
                Оплата
              </h2>
            </div>
            <div class="p-4">
              <!-- Important warning -->
              <div class="flex items-center gap-3 bg-amber-50 border-2 border-amber-400 rounded-lg p-4 mb-4">
                <svg class="w-6 h-6 text-amber-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                <p class="text-amber-800 font-semibold text-sm md:text-base">Перед оплатой товара уточните наличие у менеджера!</p>
              </div>
              
              <div class="flex flex-wrap gap-4 mb-4">
                <button type="button" class="relative p-4 border-2 border-primary bg-primary/5 rounded-lg flex flex-col items-center justify-center gap-2 min-w-[120px] min-h-[96px]">
                  <div class="absolute top-2 left-2 w-5 h-5 bg-primary rounded flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                  <span class="text-xs text-center">Наличными</span>
                </button>
                <button type="button" class="p-4 border-2 border-border rounded-lg flex flex-col items-center justify-center gap-2 min-w-[120px] min-h-[96px] hover:border-primary/50">
                  <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h.01M7 12h.01M7 17h.01M12 7h.01M12 12h.01M12 17h.01M17 7h.01M17 12h.01M17 17h.01"/></svg>
                  <span class="text-xs text-center">По QR-коду</span>
                </button>
                <button type="button" class="p-4 border-2 border-border rounded-lg flex flex-col items-center justify-center gap-2 min-w-[120px] min-h-[96px] hover:border-primary/50">
                  <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                  <span class="text-xs text-center">Кредит Сбер</span>
                </button>
                <button type="button" class="p-4 border-2 border-border rounded-lg flex flex-col items-center justify-center gap-2 min-w-[120px] min-h-[96px] hover:border-primary/50">
                  <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>
                  <span class="text-xs text-center">Кредит Тинькофф</span>
                </button>
              </div>

              <div class="flex justify-end mt-4">
                <button type="button" class="gradient-primary text-white font-bold px-6 py-2 rounded-lg">Далее</button>
              </div>
            </div>
          </div>

          <!-- Section 2: Customer info -->
          <div class="bg-white rounded-lg border mb-4 overflow-hidden">
            <div class="px-4 py-3 cursor-pointer">
              <h2 class="font-semibold flex items-center gap-2">
                <span class="w-6 h-6 bg-primary text-white rounded-full flex items-center justify-center text-sm">2</span>
                Покупатель
              </h2>
            </div>
            <div class="p-4 space-y-4 hidden">
              <div>
                <label class="text-sm"><span class="text-destructive">*</span> Имя</label>
                <input type="text" name="name" required class="w-full mt-1 px-3 py-2 border border-border rounded-lg">
              </div>
              <div>
                <label class="text-sm"><span class="text-destructive">*</span> E-mail</label>
                <input type="email" name="email" required class="w-full mt-1 px-3 py-2 border border-border rounded-lg">
              </div>
              <div>
                <label class="text-sm"><span class="text-destructive">*</span> Телефон</label>
                <input type="tel" name="phone" placeholder="+7 (___) ___-__-__" required class="w-full mt-1 px-3 py-2 border border-border rounded-lg">
              </div>
              <div>
                <label class="text-sm">Адрес</label>
                <input type="text" name="address" class="w-full mt-1 px-3 py-2 border border-border rounded-lg">
              </div>
              <div>
                <label class="text-sm">Комментарий</label>
                <textarea name="comment" rows="3" class="w-full mt-1 px-3 py-2 border border-border rounded-lg resize-none"></textarea>
              </div>
            </div>
          </div>

          <!-- Section 3: Confirmation -->
          <div class="bg-white rounded-lg border mb-4 overflow-hidden">
            <div class="px-4 py-3 cursor-pointer">
              <h2 class="font-semibold flex items-center gap-2">
                <span class="w-6 h-6 bg-primary text-white rounded-full flex items-center justify-center text-sm">3</span>
                Подтверждение
              </h2>
            </div>
            <div class="p-4 space-y-4 hidden">
              <div class="flex items-start gap-3">
                <input type="checkbox" id="agree-privacy" required class="mt-1">
                <label for="agree-privacy" class="text-sm text-muted-foreground">
                  Согласен с <a href="privacy.html" class="text-primary hover:underline">политикой конфиденциальности</a>
                </label>
              </div>
              <div class="flex items-start gap-3">
                <input type="checkbox" id="agree-call" class="mt-1">
                <label for="agree-call" class="text-sm text-muted-foreground">
                  Согласен на звонок менеджера для подтверждения заказа
                </label>
              </div>
              <button type="submit" class="w-full gradient-accent text-white font-bold py-3 rounded-lg">Подтвердить заказ</button>
            </div>
          </div>
        </form>
      </div>

      <!-- Sidebar: Order summary -->
      <div class="lg:w-80">
        <div class="bg-white rounded-lg border p-6 sticky top-24">
          <h2 class="font-bold text-lg mb-4">Ваш заказ</h2>
          <div class="space-y-3 mb-6">
            <div class="flex gap-3 pb-3 border-b border-border">
              <img src="images/trailer-1.jpg" alt="" class="w-16 h-12 object-cover rounded">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium line-clamp-2">Прицеп для квадроцикла ССТ-7132-мини</p>
                <p class="text-sm text-muted-foreground">1 шт</p>
              </div>
              <span class="font-semibold text-sm whitespace-nowrap">57 500 ₽</span>
            </div>
          </div>
          <div class="flex justify-between items-center py-3 border-t border-border">
            <span class="font-bold">Итого:</span>
            <span class="text-xl font-black text-primary">57 500 ₽</span>
          </div>
          <div class="flex items-center gap-2 mt-4 p-3 bg-amber-50 rounded-lg">
            <svg class="w-4 h-4 text-amber-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="text-xs text-amber-800">Заказ зарезервирован на 30 минут</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- FOOTER: см. index.html -->

</body>
</html>
